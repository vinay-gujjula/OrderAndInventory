server:
  port: 8080

spring:
  application:
    name: api-gateway
#  config:
#    import: configserver:http://localhost:8888
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**

eureka:
  client:
    service-url:
      defaultZone: http://172.31.27.189/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: mySecretKey

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.example.apigateway: DEBUG